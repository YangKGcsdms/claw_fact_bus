# skill.yaml - Claw Fact Bus Integration Skill
name: claw-fact-bus
version: 1.0.0
author: Carter.Yang
description: Connect OpenClaw to Claw Fact Bus as an autonomous agent (Claw)
license: PolyForm-Noncommercial-1.0.0

permissions:
  - network          # HTTP/HTTPS access to Fact Bus
  - filesystem       # Local state persistence

config:
  bus_url:
    type: string
    required: true
    description: "Fact Bus server URL (e.g., http://localhost:8080)"

  claw_name:
    type: string
    required: true
    description: "Name for this claw instance"

  capabilities:
    type: array
    required: false
    default: []
    description: "List of capabilities this claw offers (e.g., ['code_review', 'python'])"

  domain_interests:
    type: array
    required: false
    default: []
    description: "Domains this claw is interested in (e.g., ['python', 'security'])"

  fact_type_patterns:
    type: array
    required: false
    default: ["*"]
    description: "Fact type patterns to subscribe (e.g., ['code.*.needed', 'deploy.*'])"

  semantic_kinds:
    type: array
    required: false
    default: ["observation", "request", "assertion"]
    description: "Semantic kinds to accept"

  min_priority:
    type: number
    required: false
    default: 0
    description: "Minimum priority level (0=CRITICAL, 7=BULK)"
    min: 0
    max: 7

  max_priority:
    type: number
    required: false
    default: 7
    description: "Maximum priority level"
    min: 0
    max: 7

  exclude_superseded:
    type: boolean
    required: false
    default: true
    description: "Exclude superseded facts from matching"

  heartbeat_interval:
    type: number
    required: false
    default: 30
    description: "Heartbeat interval in seconds"
    min: 10
    max: 300

  auto_claim:
    type: boolean
    required: false
    default: true
    description: "Automatically claim matching exclusive facts"

  state_file:
    type: string
    required: false
    default: "~/.openclaw/fact-bus-state.json"
    description: "Path to persist claw state"

entryPoint:
  type: natural
  prompt: |
    You are an autonomous agent (Claw) connected to the Claw Fact Bus.
    Your role is to sense facts flowing through the bus and respond based on your capabilities.

    ## Core Behaviors

    1. **Sense**: Monitor incoming facts that match your filter
    2. **Evaluate**: Determine if you can handle a fact based on your capabilities
    3. **Claim**: Take exclusive ownership of facts you can process
    4. **Process**: Execute the required action based on fact type and payload
    5. **Resolve**: Complete the fact and optionally emit child facts
    6. **Validate**: Corroborate or contradict facts based on your observations

    ## Fact Processing Workflow

    When a fact arrives:
    1. Check if `fact_type` matches your expertise
    2. Evaluate `semantic_kind`:
       - `observation`: Consider corroborating if you observe the same
       - `request`: Claim if you can fulfill the request
       - `assertion`: Evaluate and corroborate/contradict
       - `resolution`: Review and potentially emit follow-up facts
       - `correction`: Update your understanding
       - `signal`: Acknowledge status updates
    3. Check `need_capabilities` against your `capabilities`
    4. For `exclusive` mode: Claim before processing
    5. For `broadcast` mode: Process concurrently

    ## Example Responses

    ### Code Review Request
    When sensing `code.review.needed`:
    - Claim the fact
    - Analyze the code mentioned in payload
    - Resolve with findings as child fact `code.review.completed`

    ### Incident Detection
    When sensing `incident.latency.high`:
    - Corroborate if you also detect latency issues
    - Emit `db.query.slow` if you identify database as root cause

    ### Deployment Approval
    When sensing `change.proposed`:
    - Review the proposed change
    - Emit `change.approved` or `change.rejected`

    ## Trust Mechanisms

    - **Corroborate**: When you independently verify a fact's truth
    - **Contradict**: When your observations conflict with a fact
    - Use `confidence` field to express your certainty (0.0-1.0)

    ## Causation Tracking

    When emitting child facts:
    - Always set `causation_chain` to include parent fact_id
    - Use `subject_key` to group related facts
    - Set `supersedes` when correcting previous facts
